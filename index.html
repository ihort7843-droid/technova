<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechNova</title>

    
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>TECHNOVA</h1>

    <div class="menu">
        <button onclick="showPage('home')">HOME</button>
        <button onclick="showPage('catalog')">CATALOG</button>
        <button onclick="showPage('about')">ABOUT</button>
        <button onclick="showPage('delivery')">DELIVERY</button>
    </div>

    <div id="home" class="page">
        <h2>TechNova</h2>
        <img src="banner.jpg" width="400">
        <p>Сучасні технології для кожного</p>
        <button>Order now</button>
    </div>

    <div id="catalog" class="page">

        <div class="card">
            <img src="laptop1.jpg" width="150">
            <p>Lenovo</p>
            <p>1500$</p>
            <button>Order</button>
        </div>

        <div class="card">
            <img src="laptop3.jpg" width="150">
            <p>Acer Aspire Lite</p>
            <p>360$</p>
            <button>Order</button>
        </div>

    </div>

    <div id="about" class="page">
        <h2>Про нас</h2>
        <p>TECHNOVA - магазин ноутбуків для навчання, роботи та ігор.</p>
    </div>

    <div id="delivery" class="page">
        <h2>Доставка</h2>
        <p>Доставка по всій Україні.</p>
    </div>

    
    <script src="script.js"></script>

</body>

</html>
